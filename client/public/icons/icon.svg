<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="DrugBug">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6f6"/>
      <stop offset="1" stop-color="#ffdce7"/>
    </linearGradient>
    <clipPath id="dbcap"><rect x="206" y="164" width="100" height="266" rx="50"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#dbg)"/>
  <!-- wings -->
  <path d="M210 252 C 156 244 126 300 150 348 C 164 376 196 366 214 326 Z" fill="#272624"/>
  <path d="M302 252 C 356 244 386 300 362 348 C 348 376 316 366 298 326 Z" fill="#272624"/>
  <!-- antennae -->
  <path d="M232 172 C 214 122 212 98 226 82" fill="none" stroke="#272624" stroke-width="20" stroke-linecap="round"/>
  <path d="M280 172 C 298 122 300 98 286 82" fill="none" stroke="#272624" stroke-width="20" stroke-linecap="round"/>
  <!-- magenta head (clipped to capsule interior) -->
  <g clip-path="url(#dbcap)"><rect x="206" y="164" width="100" height="140" fill="#9b1e4d"/></g>
  <!-- capsule outline + seam -->
  <rect x="198" y="156" width="116" height="282" rx="58" fill="none" stroke="#272624" stroke-width="20"/>
  <line x1="208" y1="300" x2="304" y2="300" stroke="#272624" stroke-width="16" stroke-linecap="round"/>
</svg>
